<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../static/css/register.css">
  <script src="../static/js/system.js"></script>
  
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }

   /* 调整选择框的位置和字号 */
   .div14 p {
      margin-top: 20px; /* 下移选择框 */
    }

    .div14 select {
      font-size: 25px; /* 调大字号 */
      padding: 5px; /* 添加一些内边距 */
      width: 100%;
    }

       /* 调整选择框的位置和字号 */
    .div11 p {
      margin-top: 20px; /* 下移选择框 */
    }

    .div11 select {
      font-size: 25px; /* 调大字号 */
      padding: 5px; /* 添加一些内边距 */
      width: 100%;
    }

    .div4 {
      width: 250px;
      height: 60px; /* 调整容器高度，确保有足够空间 */
      display: flex;
      justify-content: center; /* 居中对齐输入框 */
      align-items: flex-start; /* 将输入框稍微上移 */
      padding-top: 20px; /* 增加顶部内边距，使输入框下移 */
    }

    .input-field {
      width: 100%;
      height: 40px; /* 增大输入框高度 */
      font-size: 20px; /* 放大字体 */
      padding: 10px; /* 增加内边距，使文本更舒适 */
      border: 1px solid #000000; /* 蓝色边框 */
      border-radius: 4px; /* 圆角边框 */
    }

   </style>
  <title>Document</title>
</head>
<body>
  <div
    class="div"
    style="
      background: url(../static/fig/div.png) center;
      background-size: cover;
      background-repeat: no-repeat;
    "
  >
    <img class="logo" src="../static/fig/logo0.png" />
    <div class="div9">
      <div class="div10">注册材料：</div>
      <div class="div11">
        <p>
          <input type="file" name="files">
        </p>
      </div>
    </div>
    <div class="div12">
      <div class="div13">请选择注册身份：</div>
      <div class="div14">
        <!-- 选择框 -->
        <p>
          <select onchange="selectOption(this)">
            <option value="普通用户">普通用户</option>
            <option value="渔业从业人员">渔业从业人员</option>
            <option value="海洋资源管理人员">海洋资源管理人员</option>
            <option value="海洋研究人员">海洋研究人员</option>
          </select>
        </p>
      </div>
    </div>
    
    <form id="register-form" method="post" action="/add_account/" onsubmit="submitForm(event)">
      {% csrf_token %}
      <div class="div2">
        <div class="div3">账号：</div>
        <div class="div4">
          <input type="text" name="account" class="input-field" placeholder="请输入账号" />
        </div>
      </div>
      <div class="div6">
        <div class="div7">密码：</div>
        <div class="div4">
          <input type="text" name="password" class="input-field" placeholder="请输入密码" />
        </div>
      </div>
      <div class="div16">
        <div class="rectangle-5"></div>
        <button type="submit" class="div17">提交审核</button>
      </div>
    
      {% if message %}
        <div id="popup" class="popup {{ message_type }}">
          <p>{{ message }}</p>
          <button onclick="closePopup()">关闭</button>
        </div>
      {% endif %}
      
      <style>
        .popup {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background-color: rgba(0, 0, 0, 0.7);
          color: white;
          padding: 20px;
          border-radius: 5px;
          text-align: center;
        }
        .popup.success {
          background-color: rgb(140, 209, 255);
        }
        .popup.error {
          background-color: red;
        }
      </style>

    </form>
    



    <div class="div18">海洋渔业资源管理与可持续利用平台</div>
  </div>
  
</body>
</html>
