<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../static/css/marine_environment.css">
  <script src="../static/js/system.js"></script>
  
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
    .div5 {
      margin-top: 15px; /* 下移输入框 */
    }

    .input-field {
      font-size: 25px; /* 放大字体 */
      padding: 10px; /* 调整内边距，确保字体不紧凑 */
    }
   </style>
  <title>Document</title>
</head>
<body>
  <div
    class="div"
    style="
      background: url(../static/fig/div.png) center;
      background-size: cover;
      background-repeat: no-repeat;
    "
  >
    <div class="rectangle-6"></div>
    <div class="div2">海洋渔业资源管理与可持续利用平台</div>
    <form method="post" action="/maintain_en/">
      {% csrf_token %}
      <div class="div3">
        <div class="div4">请选择检索海域：</div>
        <div class="div5">
          <input type="text" name="sea_area" class="input-field" placeholder="请输入海域" />
        </div>      
      </div>
      <div class="div9">
        <div class="rectangle-4"></div>
        <button type="submit" class="div10">修改</button>
      </div>
      <div class="div13">
        <div class="div4">采集时间：</div>
        <div class="div5">
          <input type="text" name="time" class="input-field" placeholder="请输入采集时间" />
        </div>     
      </div>
      <div class="div15">
        <div class="div4">水质：</div>
        <div class="div5">
          <input type="text" name="water_quality" class="input-field" placeholder="请输入水质" />
        </div>     
      </div>
      <div class="div16">
        <div class="div4">水温：</div>
        <div class="div5">
          <input type="text" name="water_temp" class="input-field" placeholder="请输入水温" />
        </div>  
      </div>
      <div class="div17">
        <div class="div4">盐度：</div>
        <div class="div5">
          <input type="text" name="salinity" class="input-field" placeholder="请输入盐度" />
        </div>  
      </div>
    </form>

    <form method="post" action="/main/">
      {% csrf_token %}
      <div class="div12">
        <div class="rectangle-4"></div>
        <button type="submit" class="div10">返回主页面</button>
      </div>
    </form>
    
  </div>
  
</body>
</html>
