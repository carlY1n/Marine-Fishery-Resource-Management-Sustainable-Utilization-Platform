<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../static/css/fishing_activities.css">
  <script src="../static/js/system.js"></script>
  
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
   .div5 {
      margin-top: 15px; /* 下移输入框 */
    }

    .input-field {
      font-size: 25px; /* 放大字体 */
      padding: 10px; /* 调整内边距，确保字体不紧凑 */
    }

   </style>
  <title>Document</title>
</head>
<body>
  <div
    class="div"
    style="
      background: url(../static/fig/div.png) center;
      background-size: cover;
      background-repeat: no-repeat;
    "
  >
    <div class="div2">海洋渔业资源管理与可持续利用平台</div>
    <div class="rectangle-6"></div>
    <div class="div3">
      <div class="div4">请选择检索海域：</div>
      <div class="div5">
        <input type="text" name="account" class="input-field" placeholder="请输入海域" />
      </div>     
    </div>
    <div class="div7">
      <div class="div4">海域：</div>
      <div class="div5">
        <div class="rectangle-1"></div>
        <div class="div6">海域</div>
      </div>
    </div>
    <div class="div8">
      <div class="rectangle-4"></div>
      <div class="div9">查询</div>
    </div>
    <div class="div10">
      <div class="rectangle-4"></div>
      <div class="div9">申请</div>
    </div>
    <form method="post" action="/main/">
      {% csrf_token %}
      <div class="div12">
        <div class="rectangle-4"></div>
        <button type="submit" class="div9">返回主页面</button>
      </div>
    </form>
    <div class="div13">
      <div class="div4">采集时间：</div>
      <div class="div5">
        <div class="rectangle-1"></div>
        <div class="div6">时间</div>
      </div>
    </div>
    <div class="div14">
      <div class="div4">地理位置：</div>
      <div class="div5">
        <div class="rectangle-1"></div>
        <div class="div6">经纬度</div>
      </div>
    </div>
    <div class="div15">
      <div class="div16">渔业资源种类：</div>
      <div class="component-1">
        <div class="rectangle-1"></div>
        <div class="div17">渔业资源种类</div>
      </div>
    </div>
    <div class="div18">
      <div class="div4">渔业资源数量：</div>
      <div class="component-2">
        <div class="rectangle-1"></div>
        <div class="div19">渔业资源数量</div>
      </div>
    </div>
    <div class="div20">
      <div class="div4">渔业资源数量：</div>
      <div class="component-2">
        <div class="rectangle-1"></div>
        <div class="div19">渔业资源数量</div>
      </div>
    </div>
    <div class="div21">
      <div class="div4">可进行渔业活动：</div>
      <div class="component-2">
        <div class="rectangle-1"></div>
        <div class="div19">渔业活动编号</div>
      </div>
    </div>
  </div>
  
</body>
</html>
